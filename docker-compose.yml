services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: africagame
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-africagame_secret}
      POSTGRES_DB: africagame
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U africagame']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://africagame:${POSTGRES_PASSWORD:-africagame_secret}@postgres:5432/africagame?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-africagame-2026}
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      CORS_ORIGIN: https://africagame.2ticglobal.com,http://localhost:3000
      ADMIN_EMAIL: admin@africagame.2ticglobal.com
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Africagame!@#2026}
    expose:
      - '4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://africagame.2ticglobal.com/api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://africagame.2ticglobal.com/api
    expose:
      - '3000'

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  certbot_www:
